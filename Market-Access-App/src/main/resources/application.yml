spring:
  config:
    import: "optional:file:.env[.properties],optional:file:./Market-Access-App/.env[.properties]"
  application:
    name: Market-Access-App
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
      enabled: true

server:
  port: ${PORT:2527}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.agriconnect: ${LOG_LEVEL_APP:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] - %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

ai:
  enabled: ${AI_ENABLED:true}
  schema-version: ${AI_SCHEMA_VERSION:1.0.0}
  provider: ${AI_PROVIDER:groq}
  model: ${AI_MODEL:llama-3.3-70b-versatile}
  api-key: ${AI_GROQ_API_KEY:}
  base-url: ${AI_GROQ_BASE_URL:https://api.groq.com}
  timeout-ms: ${AI_TIMEOUT_MS:12000}
  retries: ${AI_RETRIES:2}
  chat-history-limit: ${AI_CHAT_HISTORY_LIMIT:12}
  cache-ttl-seconds: ${AI_CACHE_TTL_SECONDS:120}
  chat-public-per-minute: ${AI_CHAT_PUBLIC_PER_MINUTE:20}
  persistence:
    enabled: ${AI_PERSISTENCE_ENABLED:true}
    context-window: ${AI_PERSISTENCE_CONTEXT_WINDOW:12}
    retention-days: ${AI_PERSISTENCE_RETENTION_DAYS:30}
    max-content-length: ${AI_PERSISTENCE_MAX_CONTENT_LENGTH:3900}
    cleanup-enabled: ${AI_PERSISTENCE_CLEANUP_ENABLED:true}
    cleanup-batch-size: ${AI_PERSISTENCE_CLEANUP_BATCH_SIZE:1000}
    cleanup-max-batches: ${AI_PERSISTENCE_CLEANUP_MAX_BATCHES:5}
    cleanup-cron: ${AI_PERSISTENCE_CLEANUP_CRON:0 0 3 * * *}
