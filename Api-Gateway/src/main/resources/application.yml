spring:
  config:
    import: "optional:file:.env[.properties],optional:file:./Api-Gateway/.env[.properties]"
  application:
    name: Api-Gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      auto-commit: true
      initialization-fail-timeout: -1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
    table: flyway_schema_history_api_gateway
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:60MB}
      enabled: true

  # ── Spring Cloud Gateway MVC ─────────────────────────────────────────────
  # Routes are defined programmatically in GatewayRoutesConfig.java with
  # Resilience4j circuit breakers. No YAML routes needed here.

  # ── Email (SMTP) ──────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 5
      retry-backoff-ms: 1000
      enable-idempotence: true
      compression-type: lz4
      batch-size: 32768
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      transactional.id: ${spring.application.name}-tx

# ── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:5174,http://localhost:1819}

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    # Nginx proxies to this gateway over plain HTTP/1.1 on localhost.
    # Keeping HTTP/2 disabled avoids upstream protocol/header parsing issues
    # such as "upstream sent invalid header: \"\\x3a...\"".
    enabled: false

# ── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Twilio ────────────────────────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

# ── Feature Flags ─────────────────────────────────────────────────────────────
# FEATURE_MOBILE_VERIFICATION_ENABLED=true  → registration verify requires
#   both email OTP and mobile OTP.
# FEATURE_MOBILE_VERIFICATION_ENABLED=false → registration verify requires
#   only email OTP.
# Mirror this flag in frontend .env as: VITE_FEATURE_MOBILE_VERIFICATION_ENABLED
feature:
  mobile-verification:
    enabled: ${FEATURE_MOBILE_VERIFICATION_ENABLED:true}

# ── Circuit Breaker (Resilience4j) ───────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      contractFarming:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      marketAccess:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      generateAgreement:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      notificationService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      contractFarming:
        timeoutDuration: 10s
      marketAccess:
        timeoutDuration: 10s
      generateAgreement:
        timeoutDuration: 10s
      notificationService:
        timeoutDuration: 10s

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
# Single Swagger UI that aggregates API docs from all services.
# Proxy routes above expose each service's /v3/api-docs endpoint through this gateway.
# Access at: http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    try-it-out-enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    urls:
      - name: "API Gateway (Auth & Users)"
        url: /v3/api-docs
      - name: "Market Access (Listings & Images)"
        url: /market/v3/api-docs
      - name: "Contract Farming (Agreements, Orders, Payments)"
        url: /contract-farming/v3/api-docs
      - name: "Agreement Generator (Contracts & Cold Storage)"
        url: /agreement/v3/api-docs
      - name: "Notification Service (In-App, Email, SMS, Push)"
        url: /notifications/v3/api-docs

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  appoptics:
    metrics:
      export:
        enabled: true

notification:
  topics:
    auth: agriconnect.notifications.auth

---
# ── Production-Secure profile — SASL_SSL ─────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod-secure
  kafka:
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION:/certs/kafka.truststore.jks}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.agriconnect: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
    org.hibernate: ${LOG_LEVEL_HIBERNATE:WARN}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

