spring:
  config:
    import: "optional:file:.env[.properties],optional:file:./Api-Gateway/.env[.properties]"
  application:
    name: Api-Gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # ── Virtual Threads (Week 1) ──────────────────────────────────────────────
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: ${spring.application.name}-pool
      auto-commit: true
      initialization-fail-timeout: -1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
      jakarta:
        persistence:
          query:
            timeout: 10000
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
    table: flyway_schema_history_api_gateway
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:25MB}
      max-request-size: ${MAX_REQUEST_SIZE:60MB}
      enabled: true

  # ── Spring Cloud Gateway MVC ─────────────────────────────────────────────
  # Routes are defined programmatically in GatewayRoutesConfig.java with
  # Resilience4j circuit breakers. No YAML routes needed here.
  cloud:
    gateway:
      mvc:
        http-client:
          connect-timeout: 5000
          response-timeout: 30s
    loadbalancer:
      ribbon:
        enabled: false
      cache:
        enabled: false

  # ── Email (SMTP) ──────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 5
      retry-backoff-ms: 1000
      enable-idempotence: true
      compression-type: lz4
      batch-size: 32768
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      transactional.id: ${spring.application.name}-tx
      request.timeout.ms: 10000
      delivery.timeout.ms: 30000

  # ── Redis Configuration (Local Development) ────────────────────────────────────
  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT:6379}
      username: ${VALKEY_USERNAME:default}
      password: ${VALKEY_PASSWORD}
      ssl:
        enabled: ${VALKEY_SSL_ENABLED:true}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 500ms

# ── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:5174,http://localhost:1819}

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    # Nginx proxies to this gateway over plain HTTP/1.1 on localhost.
    # Keeping HTTP/2 disabled avoids upstream protocol/header parsing issues
    # such as "upstream sent invalid header: \"\\x3a...\"".
    enabled: false

# ── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    # Fetch registry more frequently to reduce startup-time gaps where
    # downstream services are up but not yet visible to the gateway LB cache.
    registry-fetch-interval-seconds: 5
  instance:
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Twilio ────────────────────────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

# ── Feature Flags ─────────────────────────────────────────────────────────────
# FEATURE_MOBILE_VERIFICATION_ENABLED: controls dual OTP (email+mobile) on registration
# FEATURE_KAFKA_ENABLED: set true only when Kafka + Schema Registry are running locally
# CACHE_LOCAL_ENABLED / redis.enabled: set true only when Redis is running locally
# Mirror all flags in frontend .env as VITE_FEATURE_<NAME>
feature:
  mobile-verification:
    enabled: ${FEATURE_MOBILE_VERIFICATION_ENABLED:true}
  kafka:
    enabled: ${FEATURE_KAFKA_ENABLED:false}

# ── Caching Configuration ─────────────────────────────────────────────────────
# Local: Use Redis with CACHE_LOCAL_ENABLED=true
# Production: Use Valkey with CACHE_PROD_ENABLED=true
cache:
  enabled: ${CACHE_PROD_ENABLED:false}

redis:
  enabled: ${CACHE_LOCAL_ENABLED:false}

# ── Circuit Breaker (Resilience4j) ───────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      contractFarming:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      marketAccess:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      generateAgreement:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      notificationService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      contractFarming:
        timeoutDuration: 10s
      marketAccess:
        timeoutDuration: 10s
      generateAgreement:
        timeoutDuration: 10s
      notificationService:
        timeoutDuration: 10s

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
# Single Swagger UI that aggregates API docs from all services.
# Proxy routes above expose each service's /v3/api-docs endpoint through this gateway.
# Access at: http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    try-it-out-enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    urls:
      - name: "API Gateway (Auth & Users)"
        url: /v3/api-docs
      - name: "Market Access (Listings & Images)"
        url: /market/v3/api-docs
      - name: "Contract Farming (Agreements, Orders, Payments)"
        url: /contract-farming/v3/api-docs
      - name: "Agreement Generator (Contracts & Cold Storage)"
        url: /agreement/v3/api-docs
      - name: "Notification Service (In-App, Email, SMS, Push)"
        url: /notifications/v3/api-docs

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  appoptics:
    metrics:
      export:
        enabled: true

notification:
  topics:
    auth: agriconnect.notifications.auth

---
# ── Production profile — AWS ElastiCache Valkey with TLS ──────────────────────
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT:6379}
      username: ${VALKEY_USERNAME:default}
      password: ${VALKEY_PASSWORD}
      ssl:
        enabled: ${VALKEY_SSL_ENABLED:true}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 500ms

# Override cache configuration for production
cache:
  enabled: ${CACHE_PROD_ENABLED:true}

redis:
  enabled: false # Disable local Redis beans when using ElastiCache

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.agriconnect: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
    org.hibernate: ${LOG_LEVEL_HIBERNATE:WARN}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
