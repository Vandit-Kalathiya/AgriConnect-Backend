# ─────────────────────────────────────────────────────────────────────
# Spring profile: test  (activated by SPRING_PROFILES_ACTIVE=test in CI)
#
# Razorpay properties use @NotBlank validation.
# Dummy non-blank strings satisfy validation without calling any API.
# ─────────────────────────────────────────────────────────────────────

server:
  port: 0

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

# ── Razorpay ───────────────────────────────────────────────────────
razorpay:
  key:
    id: ci_dummy_razorpay_id
    secret: ci_dummy_razorpay_secret

# ── Eureka (fully disabled) ────────────────────────────────────────
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health
