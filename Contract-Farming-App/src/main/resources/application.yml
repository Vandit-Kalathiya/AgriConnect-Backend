spring:
  config:
    import: "optional:file:.env[.properties],optional:file:./Contract-Farming-App/.env[.properties]"
  application:
    name: Contract-Farming-App
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: ${spring.application.name}-pool
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
      jakarta:
        persistence:
          query:
            timeout: 10000
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 5
      retry-backoff-ms: 1000
      enable-idempotence: true
      compression-type: lz4
      batch-size: 32768
      linger-ms: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      transactional.id: ${spring.application.name}-tx
      request.timeout.ms: 10000
      delivery.timeout.ms: 30000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 500ms

cache:
  local:
    enabled: ${CACHE_LOCAL_ENABLED:false}
  prod:
    enabled: ${CACHE_PROD_ENABLED:false}

redis:
  enabled: ${CACHE_LOCAL_ENABLED:false}

feature:
  kafka:
    enabled: ${FEATURE_KAFKA_ENABLED:false}

server:
  port: ${PORT:2526}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    appname: Contract-Farming-App
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}
  currency: ${RAZORPAY_CURRENCY:INR}
  company:
    name: ${RAZORPAY_COMPANY_NAME:AgriConnect}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.agriconnect: ${LOG_LEVEL_APP:DEBUG}

notification:
  topics:
    contract: agriconnect.notifications.contract

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

---
# ── Production profile — AWS ElastiCache Valkey with TLS ──────────────────────
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      url: ${VALKEY_URL}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: true
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 500ms

cache:
  local:
    enabled: false
  prod:
    enabled: ${CACHE_PROD_ENABLED:true}

redis:
  enabled: ${CACHE_PROD_ENABLED:true}

---
# ── Production-Secure profile — SASL_SSL ─────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod-secure
  kafka:
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION:/certs/kafka.truststore.jks}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
