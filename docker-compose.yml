services:
  eureka-server:
    build:
      context: ./Eureka-Main-Server
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-eureka-server:${TAG:-latest}
    container_name: agriconnect-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      PORT: 8761
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_HOSTNAME: eureka-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - agriconnect

  # ── API Gateway ─────────────────────────────────────────────────────────────
  # The central entry point for all client traffic.
  # Handles JWT authentication/authorization, then routes to downstream services.
  # Auth & user management are served directly by this service.
  api-gateway:
    build:
      context: ./Api-Gateway
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-api-gateway:${TAG:-latest}
    container_name: agriconnect-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./Api-Gateway/.env
    environment:
      PORT: 8080
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      eureka-server:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      market-access:
        condition: service_healthy
      contract-farming:
        condition: service_healthy
      generate-agreement:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agriconnect

  # ── Downstream Services ─────────────────────────────────────────────────────
  # These services are accessible ONLY through the API Gateway.
  # They trust the X-User-Phone header injected by the gateway.

  contract-farming:
    build:
      context: ./Contract-Farming-App
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-contract-farming:${TAG:-latest}
    container_name: agriconnect-contract-farming
    restart: unless-stopped
    ports:
      - "2526:2526"
    env_file: ./Contract-Farming-App/.env
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2526/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agriconnect

  market-access:
    build:
      context: ./Market-Access-App
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-market-access:${TAG:-latest}
    container_name: agriconnect-market-access
    restart: unless-stopped
    ports:
      - "2527:2527"
    env_file: ./Market-Access-App/.env
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2527/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agriconnect

  generate-agreement:
    build:
      context: ./Generate-Agreement-App
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-generate-agreement:${TAG:-latest}
    container_name: agriconnect-generate-agreement
    restart: unless-stopped
    ports:
      - "2529:2529"
    env_file: ./Generate-Agreement-App/.env
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2529/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agriconnect

  # ── Kafka (KRaft — no ZooKeeper) ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: agriconnect-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "q1Sh3IFiRBCzsAGzbU6nPQ"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agriconnect

  # ── Confluent Schema Registry ────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: agriconnect-schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agriconnect

  # ── Kafka Topic Initialiser (one-shot) ───────────────────────────────────────
  # Creates all required topics on first boot.
  # Replication-factor is 1 for single-broker Docker Compose; use 3 in production.
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: agriconnect-kafka-init
    restart: no
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agriconnect.notifications.auth     --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agriconnect.notifications.market   --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agriconnect.notifications.contract --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agriconnect.notifications.agreement --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic agriconnect.notifications.dlq      --partitions 3 --replication-factor 1 &&
        echo 'All notification topics created.'
      "
    networks:
      - agriconnect

  # ── Kafka UI (management console) ───────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: agriconnect-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: agriconnect
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - agriconnect

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./Notification-Service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/agriconnect-notification-service:${TAG:-latest}
    container_name: agriconnect-notification-service
    restart: unless-stopped
    ports:
      - "2530:2530"
    env_file: ./Notification-Service/.env
    environment:
      PORT: 2530
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2530/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agriconnect

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: agriconnect-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - agriconnect

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: agriconnect-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - agriconnect

networks:
  agriconnect:
    driver: bridge

volumes:
  kafka-data:
  prometheus-data:
  grafana-data:
