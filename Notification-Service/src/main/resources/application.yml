spring:
  config:
    import: "optional:file:.env[.properties],optional:file:./Notification-Service/.env[.properties]"
  application:
    name: Notification-Service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: ${spring.application.name}-pool

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
      jakarta:
        persistence:
          query:
            timeout: 10000
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_notification

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # ── Kafka Consumer ───────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: agriconnect-notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      fetch-min-size: 1024
      fetch-max-wait: 500ms
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
    # DLQ producer config (Notification-Service also writes to DLQ topic)
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 50
      missing-topics-fatal: false
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      specific.avro.reader: true
      session.timeout.ms: 30000
      heartbeat.interval.ms: 10000
      max.poll.interval.ms: 300000

  # ── Redis/Valkey Caching ──────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 500ms

cache:
  enabled: ${CACHE_PROD_ENABLED:false}

redis:
  enabled: ${CACHE_LOCAL_ENABLED:false}

feature:
  kafka:
    enabled: ${FEATURE_KAFKA_ENABLED:false}

server:
  port: ${PORT:2530}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
  http2:
    # Internal service behind Api-Gateway — HTTP/2 disabled to avoid
    # ":status" pseudo-header issues when Nginx proxies via HTTP/1.1.
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    appname: Notification-Service
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Twilio ────────────────────────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

# ── Firebase FCM ──────────────────────────────────────────────────────────────
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# ── Notification Topics ───────────────────────────────────────────────────────
notification:
  topics:
    auth: agriconnect.notifications.auth
    market: agriconnect.notifications.market
    contract: agriconnect.notifications.contract
    agreement: agriconnect.notifications.agreement
    dlq: agriconnect.notifications.dlq

# ── Observability ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  metrics:
    tags:
      service: notification-service
    distribution:
      percentiles-histogram:
        notification.dispatch.duration: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.agriconnect: ${LOG_LEVEL_APP:DEBUG}
    org.apache.kafka: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} eventId=%X{eventId} correlationId=%X{correlationId} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

---
# ── Production profile — AWS ElastiCache Valkey with TLS ──────────────────────
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      url: ${VALKEY_URL}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: ${VALKEY_SSL_ENABLED:true}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 500ms

cache:
  enabled: ${CACHE_PROD_ENABLED:true}

redis:
  enabled: false # Disable local Redis beans when using ElastiCache
