# ============================================================
#  AgriConnect — CI/CD Pipeline
#  Trigger : push → main  |  pull_request → main  |  manual
#
#  Jobs
#  ────
#  1. build              Compile and package every microservice in
#                        parallel. Runs on every push/PR so broken
#                        commits are caught before they can be merged.
#
#  2. docker-push        Build each service's Docker image with Buildx
#                        layer-caching and push three tags to Docker Hub:
#                          • latest
#                          • sha-<short-sha>   ← used by the deploy job
#                          • build-<run-number>
#                        Runs only on direct push to main (not PRs).
#
#  3. deploy             SSH into EC2, update the TAG in the root .env,
#                        pull new images, restart all containers, and
#                        reload Nginx. Runs only after docker-push succeeds.
#
#  4. pipeline-summary   Writes a single consolidated Markdown summary
#                        at the end of the entire pipeline run.
#
# ──────────────────────────────────────────────────────────────────────
#  Required GitHub Secrets  (Settings → Secrets → Actions)
# ──────────────────────────────────────────────────────────────────────
#  DOCKER_USERNAME   Docker Hub username
#  DOCKER_PASSWORD   Docker Hub access token
#  EC2_HOST          EC2 public IP or domain name
#  EC2_USER          SSH username  (ubuntu  or  ec2-user)
#  EC2_SSH_KEY       Full contents of the EC2 .pem private key file
#  EC2_PORT          SSH port  (optional — defaults to 22)
#
# ──────────────────────────────────────────────────────────────────────
#  EC2 pre-requisites  (one-time manual setup)
# ──────────────────────────────────────────────────────────────────────
#  1. Docker + Docker Compose plugin installed
#  2. Repo cloned at  ~/AgriConnect_Backend
#  3. ~/AgriConnect_Backend/.env  populated with:
#       DOCKER_USERNAME=<your-dockerhub-username>
#       TAG=latest                    ← pipeline updates this automatically
#       GATEWAY_URL=http://<EC2-IP>:8080
#  4. Service .env files in place:
#       ~/AgriConnect_Backend/Api-Gateway/.env
#       ~/AgriConnect_Backend/Contract-Farming-App/.env
#       ~/AgriConnect_Backend/Market-Access-App/.env
#       ~/AgriConnect_Backend/Generate-Agreement-App/.env
# ============================================================

name: CI/CD — Build · Docker Push · Deploy to EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel any in-flight run on the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────────
  # JOB 1 · Build & Package
  # All six microservices are compiled and packaged in parallel.
  # Tests are skipped (-DskipTests) since no real tests exist yet.
  # ──────────────────────────────────────────────────────────────────
  build:
    name: "Build · ${{ matrix.service }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # if one service fails to compile, others still run
      matrix:
        include:
          - { service: Eureka-Main-Server,     java: "23" }
          - { service: Api-Gateway,            java: "23" }
          - { service: Contract-Farming-App,   java: "21" }
          - { service: Market-Access-App,      java: "24" }
          - { service: Generate-Agreement-App, java: "21" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile & package — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn package -DskipTests --batch-mode --no-transfer-progress


  # ──────────────────────────────────────────────────────────────────
  # JOB 2 · Docker Build & Push to Docker Hub
  # Runs only on direct push to main (not on PRs).
  # Each service gets three tags:
  #   latest         → always the newest main build
  #   sha-<short>    → pinnable, immutable — used by the deploy job
  #   build-<number> → monotonically increasing counter
  # GHA layer cache is scoped per service so rebuilds stay fast.
  # ──────────────────────────────────────────────────────────────────
  docker-push:
    name: "Docker Push · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: Eureka-Main-Server,     image: agriconnect-eureka-server      }
          - { service: Api-Gateway,            image: agriconnect-api-gateway        }
          - { service: Contract-Farming-App,   image: agriconnect-contract-farming   }
          - { service: Market-Access-App,      image: agriconnect-market-access      }
          - { service: Generate-Agreement-App, image: agriconnect-generate-agreement }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=AgriConnect ${{ matrix.service }} microservice
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}


  # ──────────────────────────────────────────────────────────────────
  # JOB 3 · Deploy to EC2
  # Waits for every service image to be pushed to Docker Hub, then
  # SSHes into EC2 and performs a rolling restart:
  #   1. git pull       — sync docker-compose.yml with latest commit
  #   2. Update TAG     — point .env at the exact sha-tagged images
  #   3. compose pull   — download the new images from Docker Hub
  #   4. compose up -d  — restart containers with the new images
  #   5. nginx reload   — apply any Nginx config changes
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to EC2"
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        ${{ secrets.EC2_PORT || 22 }}
          envs:        SHORT_SHA
          script_stop: true
          script: |
            set -e
            APP_DIR="$HOME/AgriConnect_Backend"

            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: $APP_DIR not found. Clone the repository to ~/AgriConnect_Backend first."
              exit 1
            fi

            cd "$APP_DIR"

            echo "━━━ [1/5] Pulling latest repo changes ━━━"
            git pull origin main

            echo "━━━ [2/5] Pinning image tag → sha-${SHORT_SHA} ━━━"
            if grep -q "^TAG=" .env 2>/dev/null; then
              sed -i "s|^TAG=.*|TAG=sha-${SHORT_SHA}|" .env
            else
              echo "TAG=sha-${SHORT_SHA}" >> .env
            fi

            echo "━━━ [3/5] Pulling Docker images ━━━"
            docker compose pull

            echo "━━━ [4/5] Restarting services ━━━"
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "━━━ [5/5] Reloading Nginx ━━━"
            sudo nginx -t && sudo systemctl reload nginx

            echo ""
            echo "━━━ Deployment complete ━━━"
            docker compose ps


  # ──────────────────────────────────────────────────────────────────
  # JOB 4 · Pipeline Summary
  # Single consolidated summary written once at the very end.
  # ──────────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [ build, docker-push, deploy ]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write consolidated summary
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          DOCKER_RESULT="${{ needs.docker-push.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"

          icon() {
            if   [[ "$1" == "success"  ]]; then echo "✅ Passed"
            elif [[ "$1" == "failure"  ]]; then echo "❌ Failed"
            elif [[ "$1" == "skipped"  ]]; then echo "⏭️ Skipped"
            else echo "⚠️ $1"; fi
          }

          # ── Pipeline status ────────────────────────────────────────
          echo "## AgriConnect CI/CD — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Package (5 services) | $(icon $BUILD_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build & Push          | $(icon $DOCKER_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to EC2 + Nginx reload | $(icon $DEPLOY_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }} &nbsp;|&nbsp; **Branch:** \`${{ github.ref_name }}\` &nbsp;|&nbsp; **Commit:** \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY

          # ── Docker images (only when push succeeded) ───────────────
          if [[ "$DOCKER_RESULT" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Docker Images pushed to Hub" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
            for image in \
              agriconnect-eureka-server \
              agriconnect-api-gateway \
              agriconnect-contract-farming \
              agriconnect-market-access \
              agriconnect-generate-agreement
            do
              echo "| \`${DOCKER_USER}/${image}\` | \`latest\` · \`sha-${SHORT_SHA}\` · \`build-${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          # ── Deploy details (only when deploy succeeded) ────────────
          if [[ "$DEPLOY_RESULT" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Host | \`${{ secrets.EC2_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Image tag deployed | \`sha-${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Nginx | Reloaded ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if build stage failed
        if: needs.build.result == 'failure'
        run: |
          echo "Build stage failed. Fix compilation errors and push again."
          exit 1

      - name: Fail if deploy stage failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deploy stage failed. SSH into EC2 and check: docker compose logs"
          exit 1
